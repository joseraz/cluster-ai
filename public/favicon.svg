<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark rounded square background -->
  <rect width="100" height="100" rx="20" ry="20" fill="#1a1a1a"/>

  <!-- Connector lines -->
  <!-- Root to left-mid -->
  <line x1="50" y1="28" x2="28" y2="52" stroke="#C9A96E" stroke-width="3" stroke-linecap="round"/>
  <!-- Root to right-mid -->
  <line x1="50" y1="28" x2="72" y2="52" stroke="#C9A96E" stroke-width="3" stroke-linecap="round"/>
  <!-- Left-mid to left-leaf -->
  <line x1="28" y1="52" x2="18" y2="74" stroke="#C9A96E" stroke-width="3" stroke-linecap="round"/>
  <!-- Left-mid to center-leaf -->
  <line x1="28" y1="52" x2="38" y2="74" stroke="#C9A96E" stroke-width="3" stroke-linecap="round"/>
  <!-- Right-mid to right-leaf -->
  <line x1="72" y1="52" x2="82" y2="74" stroke="#C9A96E" stroke-width="3" stroke-linecap="round"/>

  <!-- Nodes -->
  <!-- Root node -->
  <rect x="40" y="16" width="20" height="16" rx="4" fill="#C9A96E"/>
  <!-- Left mid node -->
  <rect x="18" y="44" width="20" height="16" rx="4" fill="#C9A96E"/>
  <!-- Right mid node -->
  <rect x="62" y="44" width="20" height="16" rx="4" fill="#C9A96E"/>
  <!-- Left leaf node -->
  <rect x="8" y="68" width="20" height="14" rx="4" fill="#C9A96E"/>
  <!-- Center leaf node -->
  <rect x="28" y="68" width="20" height="14" rx="4" fill="#C9A96E"/>
  <!-- Right leaf node -->
  <rect x="72" y="68" width="20" height="14" rx="4" fill="#C9A96E"/>
</svg>
